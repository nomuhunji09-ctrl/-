<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자동완성 검색기 Pro</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #ffffff; /* 완전히 하얀 바탕 */
        }
        .search-box {
            position: relative;
            width: 300px;
            margin: 50px auto 0 auto;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            max-height: 260px; /* 단어가 많을 때 볼 수 있도록 스크롤 창 크기 확보 */
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #333;
        }
        .autocomplete-item:hover {
            background-color: #f0f0f0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="검색어를 입력하세요..." autocomplete="off">
    <div id="suggestionList" class="autocomplete-list"></div>
</div>

<div id="toast" class="toast">클립보드에 복사되었습니다!</div>

<script>
    // words.txt 파일에서 단어를 불러와 저장할 배열
    let wordDatabase = [];

    // words.txt 파일을 비동기로 읽어오는 함수
    async function loadWords() {
        try {
            // 같은 저장소에 있는 words.txt에 요청
            const response = await fetch('words.txt');
            if (!response.ok) throw new Error('파일을 불러오지 못했습니다.');
            
            // 텍스트 파일 내용을 읽어옴
            const data = await response.text();
            
            // 엔터를 기준으로 단어를 쪼개고 빈 줄은 제거해서 배열에 저장
            wordDatabase = data.split(/\r?\n/).map(word => word.trim()).filter(word => word.length > 0);
            console.log(`${wordDatabase.length}개의 단어가 정상 로드되었습니다.`);
        } catch (error) {
            console.error('단어 로딩 실패:', error);
        }
    }

    // 페이지가 켜지자마자 단어장 로드
    loadWords();

    const searchInput = document.getElementById('searchInput');
    const suggestionList = document.getElementById('suggestionList');
    const toast = document.getElementById('toast');

    searchInput.addEventListener('input', function() {
        const query = this.value;
        suggestionList.innerHTML = '';

        if (!query) return;

        // 입력한 글자로 시작하는 단어들 필터링
        const filtered = wordDatabase.filter(item => item.startsWith(query));

        filtered.forEach(word => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.textContent = word;

            div.addEventListener('click', function() {
                searchInput.value = word;
                
                // 클립보드 복사 기능
                navigator.clipboard.writeText(word).then(() => {
                    showToast(`"${word}" 복사 완료!`);
                }).catch(err => {
                    // 비상용 백업 복사 기능
                    const textarea = document.createElement('textarea');
                    textarea.value = word;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast(`"${word}" 복사 완료!`);
                });

                suggestionList.innerHTML = '';
            });

            suggestionList.appendChild(div);
        });
    });

    // 검색창 바깥을 누르면 목록 닫기
    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) {
            suggestionList.innerHTML = '';
        }
    });

    // 토스트 알림창 띄우기
    function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 1500);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 v3.7 (검색 엔진 탑재)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 1080px; margin: 0 auto; }
        .search-box { width: 100%; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 14px; font-size: 18px; box-sizing: border-box; border: 2px solid #111; border-radius: 6px; font-weight: bold; }
        .result-wrapper { display: flex; gap: 15px; margin-bottom: 20px; }
        .result-column { flex: 1; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 10px; min-height: 200px; }
        .column-title { font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #333; padding-bottom: 5px; }
        .list-content { max-height: 300px; overflow-y: auto; font-size: 14px; }
        .item { padding: 5px; border-bottom: 1px solid #eee; }
        .admin-section { display: flex; gap: 15px; }
        .admin-box { flex: 1; }
        textarea { width: 100%; height: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="검색할 글자를 입력하세요" oninput="performSearch()">
    </div>

    <div class="result-wrapper">
        <div class="result-column"><div class="column-title">🛡️ 방어/공격</div><div id="mainList" class="list-content"></div></div>
        <div class="result-column"><div class="column-title">💀 죽이는용</div><div id="killList" class="list-content"></div></div>
    </div>

    <div class="admin-section">
        <div class="admin-box">
            <textarea id="mainInput" placeholder="방어/공격 단어 입력"></textarea>
            <button onclick="saveData('main')">저장</button>
        </div>
        <div class="admin-box">
            <textarea id="killInput" placeholder="죽이는용 단어 입력"></textarea>
            <button onclick="saveData('kill')">죽이는용 저장</button>
        </div>
    </div>
</div>

<script>
    let db;
    const request = indexedDB.open("KKUTU_DB", 3); // 버전 3으로 업데이트

    request.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("words")) db.createObjectStore("words", { keyPath: "id" });
    };

    request.onsuccess = e => {
        db = e.target.result;
        loadAllData(); // 페이지 접속 시 DB 불러오기
    };

    function saveData(type) {
        const text = document.getElementById(`${type}Input`).value;
        const tx = db.transaction("words", "readwrite");
        tx.objectStore("words").put({ id: type, text: text });
        alert("저장되었습니다!");
    }

    function loadAllData() {
        const tx = db.transaction("words", "readonly");
        const store = tx.objectStore("words");
        
        store.get("main").onsuccess = e => { if(e.target.result) document.getElementById('mainInput').value = e.target.result.text; };
        store.get("kill").onsuccess = e => { if(e.target.result) document.getElementById('killInput').value = e.target.result.text; };
    }

    function performSearch() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        const mainText = document.getElementById('mainInput').value;
        const killText = document.getElementById('killInput').value;

        // 검색 로직: 입력한 글자로 시작하는 단어 찾기
        document.getElementById('mainList').innerHTML = mainText.split('\n').filter(w => w.startsWith(query)).map(w => `<div class="item">${w}</div>`).join('');
        document.getElementById('killList').innerHTML = killText.split('\n').filter(w => w.startsWith(query)).map(w => `<div class="item">${w}</div>`).join('');
    }
</script>
</body>
</html>

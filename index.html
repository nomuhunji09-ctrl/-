<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 검색기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #ffffff;
        }
        .container {
            max-width: 400px;
            margin: 30px auto;
        }
        .search-box {
            position: relative;
            width: 100%;
            margin-bottom: 40px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border: 2px solid #111;
            border-radius: 6px;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            max-height: 350px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 0 0 6px 6px;
        }
        .section-title {
            background: #f0f0f0;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }
        .section-title.defense { color: #2f80ed; background: #e3f2fd; }
        .section-title.attack { color: #eb5757; background: #fde8e8; }
        
        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #333;
            border-bottom: 1px solid #f9f9f9;
        }
        .autocomplete-item:hover {
            background-color: #f5f5f5;
        }
        .no-result {
            padding: 15px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        
        /* 단어 관리자 구역 */
        .admin-box {
            margin-top: 50px;
            padding: 15px;
            border: 1px dashed #ccc;
            border-radius: 6px;
            background: #fafafa;
        }
        .admin-title {
            font-size: 13px;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 8px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 5px;
        }
        .btn:hover { background: #111; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 검색창 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="글자를 입력하세요 (예: 륨, 녘)" autocomplete="off">
        <div id="suggestionList" class="autocomplete-list"></div>
    </div>

    <!-- 존나게 쉬운 단어 추가창 -->
    <div class="admin-box">
        <div class="admin-title">🛠️ 나만의 단어 추가기 (한 줄에 하나씩 엔터)</div>
        <textarea id="customWordsInput" placeholder="여기에 추가할 단어들을 엔터 치면서 쭉 붙여넣으세요.&#10;예시:&#10;나만의단어1&#10;나만의단어2"></textarea>
        <button class="btn" onclick="saveCustomWords()">단어장 저장하기</button>
    </div>
</div>

<div id="toast" class="toast">복사되었습니다!</div>

<script>
    // 기본 탑재된 레전드 단어장
    const defaultWords = [
        "기뇰", "기상천외", "기하학", "기치창검", "기회주의", "기함", "뇨로", "뇨화", "뇨소", "뇨단백", "뇨붕증", "뇨산", 
        "루테늄", "루미놀", "루시퍼", "루게릭", "루마늄", "늄바", "늄바니", "임바니", "륨카펫", "륨바", "윰바", "륨제", 
        "슘페터", "슘가", "튬바", "튬스", "뮴산", "듐바", "륄리", "똠방각하", "똠양꿍", "틋틋", "늣가을", "슭곰", 
        "슭바람", "닢동전", "녘새바람", "즘생", "즙액", "쯧쯧", "믜리", "늬우스", "닻줄", "돛대", "덫사냥",
        "산나물", "동동구루무", "염화나트륨", "수산화칼륨", "타륨", "이륨", "카드뮴", "칼슘", "스트론튬", "헤륨", 
        "해질녘", "동녘", "서녘", "남녘", "북녘", "새녘", "오솔길", "이리듐", "탈륨", "우라늄", "티타늄", "플루토늄", 
        "헬륨", "바륨", "프랑슘", "라듐", "알루미늄", "개미핥기", "산기슭", "처마기슭", "강기슭"
    ];

    // 두음법칙 매핑
    const initialLaw = {
        '륨': '윰', '늄': '임', '륨': '임', '룡': '용', '린': '인', 
        '림': '임', '립': '입', '량': '양', '려': '여', '례': '예', 
        '로': '오', '뢰': '외', '루': '우', '류': '유', '라': '아'
    };
    const reverseInitialLaw = {};
    for (const [key, value] of Object.entries(initialLaw)) { reverseInitialLaw[value] = key; }

    // 사이트 켤 때 기존 저장된 내 단어 가져오기
    let wordDatabase = [...defaultWords];
    loadCustomWords();

    function loadCustomWords() {
        const saved = localStorage.getItem('myCustomWords');
        if (saved) {
            const customList = JSON.parse(saved);
            wordDatabase = [...defaultWords, ...customList];
            document.getElementById('customWordsInput').value = customList.join('\n');
        }
    }

    // [쉽게하기 핵심] 버튼 누르면 코드 수정 없이 바로 브라우저에 저장됨
    function saveCustomWords() {
        const text = document.getElementById('customWordsInput').value;
        const customList = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
        
        localStorage.setItem('myCustomWords', JSON.stringify(customList));
        wordDatabase = [...defaultWords, ...customList];
        
        showToast("💾 단어장이 성공적으로 업데이트되었습니다!");
    }

    const searchInput = document.getElementById('searchInput');
    const suggestionList = document.getElementById('suggestionList');
    const toast = document.getElementById('toast');

    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        suggestionList.innerHTML = '';
        if (!query) return;

        let queries = [query];
        if (initialLaw[query]) queries.push(initialLaw[query]);
        if (reverseInitialLaw[query]) queries.push(reverseInitialLaw[query]);
        queries = [...new Set(queries)];

        let defenseWords = [];
        queries.forEach(q => {
            const matches = wordDatabase.filter(item => item.startsWith(q));
            defenseWords = defenseWords.concat(matches);
        });
        defenseWords = [...new Set(defenseWords)];

        const attackWords = wordDatabase.filter(item => item.endsWith(query));

        if (defenseWords.length === 0 && attackWords.length === 0) {
            suggestionList.innerHTML = '<div class="no-result">검색 결과가 없습니다.</div>';
            return;
        }

        if (defenseWords.length > 0) {
            const title = document.createElement('div');
            title.className = 'section-title defense';
            title.textContent = `🛡️ 방어용 (${queries.join(', ')}로 시작)`;
            suggestionList.appendChild(title);
            defenseWords.forEach(word => createItem(word));
        }

        if (attackWords.length > 0) {
            const title = document.createElement('div');
            title.className = 'section-title attack';
            title.textContent = `⚔️ 공격용 (${query}로 끝남 - 한방 단어)`;
            suggestionList.appendChild(title);
            attackWords.forEach(word => createItem(word));
        }
    });

    function createItem(word) {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        div.textContent = word;
        div.addEventListener('click', function() {
            searchInput.value = word;
            navigator.clipboard.writeText(word).then(() => {
                showToast(`"${word}" 복사 완료!`);
            }).catch(err => {
                const textarea = document.createElement('textarea');
                textarea.value = word;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`"${word}" 복사 완료!`);
            });
            suggestionList.innerHTML = '';
        });
        suggestionList.appendChild(div);
    }

    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) suggestionList.innerHTML = '';
    });

    function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    }
</script>

</body>
</html>

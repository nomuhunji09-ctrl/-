<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 검색기 Dual v2</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #ffffff;
        }
        .container {
            max-width: 700px; /* 양옆으로 넓히기 위해 크기를 키웠습니다 */
            margin: 30px auto;
        }
        .search-box {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            box-sizing: border-box;
            border: 2px solid #111;
            border-radius: 6px;
            font-weight: bold;
        }
        
        /* [핵심 변형] 양옆으로 갈라지는 레이아웃 */
        .result-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            min-height: 100px;
        }
        .result-column {
            flex: 1;
            background: #fff;
            border: 2px solid #333;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .column-title {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #333;
        }
        .column-title.defense { color: #fff; background: #2f80ed; }
        .column-title.attack { color: #fff; background: #eb5757; }
        
        .list-content {
            max-height: 350px;
            overflow-y: auto;
        }
        .autocomplete-item {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            color: #333;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .autocomplete-item:hover {
            background-color: #f5f5f5;
        }
        .no-result {
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        
        /* 단어 관리자 구역 */
        .admin-box {
            margin-top: 40px;
            padding: 15px;
            border: 1px dashed #ccc;
            border-radius: 6px;
            background: #fafafa;
        }
        .admin-title {
            font-size: 13px;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
            box-sizing: border-box;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #111; }
        
        /* 맨 밑에 요청하신 요소 추가 */
        .footer-banner {
            margin-top: 50px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #444;
            padding: 20px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
            border-radius: 6px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 검색창 (이제 아래 리스트가 항상 고정되어 보입니다) -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="글자를 입력하세요 (예: 기, 륨, 녘)" autocomplete="off">
    </div>

    <!-- 양옆 분할 결과창 -->
    <div class="result-wrapper">
        <!-- 왼쪽: 방어용 -->
        <div class="result-column">
            <div id="defenseTitle" class="column-title defense">🛡️ 방어용 (시작하는 단어)</div>
            <div id="defenseList" class="list-content">
                <div class="no-result">글자를 입력하면 창이 뜹니다.</div>
            </div>
        </div>
        
        <!-- 오른쪽: 공격용 -->
        <div class="result-column">
            <div id="attackTitle" class="column-title attack">⚔️ 공격용 (끝나는 단어)</div>
            <div id="attackList" class="list-content">
                <div class="no-result">글자를 입력하면 창이 뜹니다.</div>
            </div>
        </div>
    </div>

    <!-- 단어 추가기 -->
    <div class="admin-box">
        <div class="admin-title">🛠️ 나만의 단어 추가기 (한 줄에 하나씩 엔터)</div>
        <textarea id="customWordsInput" placeholder="여기에 추가할 단어들을 엔터 치면서 쭉 붙여넣으세요."></textarea>
        <button class="btn" onclick="saveCustomWords()">단어장 저장하기</button>
    </div>
    
    <!-- 요청하신 맨 밑 바닥 구역 -->
    <div class="footer-banner">
        노무현
    </div>
</div>

<div id="toast" class="toast">복사되었습니다!</div>

<script>
    // 기본 레전드 단어장
    const defaultWords = [
        "기뇰", "기상천외", "기하학", "기치창검", "기회주의", "기함", "뇨로", "뇨화", "뇨소", "뇨단백", "뇨붕증", "뇨산", 
        "루테늄", "루미놀", "루시퍼", "루게릭", "루마늄", "늄바", "늄바니", "임바니", "륨카펫", "륨바", "윰바", "륨제", 
        "슘페터", "슘가", "튬바", "튬스", "뮴산", "듐바", "륄리", "똠방각하", "똠양꿍", "틋틋", "늣가을", "슭곰", 
        "슭바람", "닢동전", "녘새바람", "즘생", "즙액", "쯧쯧", "믜리", "늬우스", "닻줄", "돛대", "덫사냥",
        "산나물", "동동구루무", "염화나트륨", "수산화칼륨", "타륨", "이륨", "카드뮴", "칼슘", "스트론튬", "헤륨", 
        "해질녘", "동녘", "서녘", "남녘", "북녘", "새녘", "오솔길", "이리듐", "탈륨", "우라늄", "티타늄", "플루토늄", 
        "헬륨", "바륨", "프랑슘", "라듐", "알루미늄", "개미핥기", "산기슭", "처마기슭", "강기슭"
    ];

    const initialLaw = {
        '륨': '윰', '늄': '임', '륨': '임', '룡': '용', '린': '인', 
        '림': '임', '립': '입', '량': '양', '려': '여', '례': '예', 
        '로': '오', '뢰': '외', '루': '우', '류': '유', '라': '아'
    };
    const reverseInitialLaw = {};
    for (const [key, value] of Object.entries(initialLaw)) { reverseInitialLaw[value] = key; }

    let wordDatabase = [...defaultWords];
    loadCustomWords();

    function loadCustomWords() {
        const saved = localStorage.getItem('myCustomWords');
        if (saved) {
            const customList = JSON.parse(saved);
            wordDatabase = [...defaultWords, ...customList];
            document.getElementById('customWordsInput').value = customList.join('\n');
        }
    }

    function saveCustomWords() {
        const text = document.getElementById('customWordsInput').value;
        const customList = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
        localStorage.setItem('myCustomWords', JSON.stringify(customList));
        wordDatabase = [...defaultWords, ...customList];
        showToast("💾 단어장이 성공적으로 업데이트되었습니다!");
    }

    const searchInput = document.getElementById('searchInput');
    const defenseList = document.getElementById('defenseList');
    const attackList = document.getElementById('attackList');
    const defenseTitle = document.getElementById('defenseTitle');
    const attackTitle = document.getElementById('attackTitle');
    const toast = document.getElementById('toast');

    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        
        if (!query) {
            defenseTitle.textContent = "🛡️ 방어용 (시작하는 단어)";
            attackTitle.textContent = "⚔️ 공격용 (끝나는 단어)";
            defenseList.innerHTML = '<div class="no-result">글자를 입력하면 창이 뜹니다.</div>';
            attackList.innerHTML = '<div class="no-result">글자를 입력하면 창이 뜹니다.</div>';
            return;
        }

        // 두음법칙 연산
        let queries = [query];
        if (initialLaw[query]) queries.push(initialLaw[query]);
        if (reverseInitialLaw[query]) queries.push(reverseInitialLaw[query]);
        queries = [...new Set(queries)];

        defenseTitle.textContent = `🛡️ 방어용 (${queries.join(', ')}로 시작)`;
        attackTitle.textContent = `⚔️ 공격용 (${query}로 끝남)`;

        // 방어 필터링
        let defenseWords = [];
        queries.forEach(q => {
            const matches = wordDatabase.filter(item => item.startsWith(q));
            defenseWords = defenseWords.concat(matches);
        });
        defenseWords = [...new Set(defenseWords)];

        // 공격 필터링
        const attackWords = wordDatabase.filter(item => item.endsWith(query));

        // 방어용 렌더링
        defenseList.innerHTML = '';
        if (defenseWords.length > 0) {
            defenseWords.forEach(word => {
                defenseList.appendChild(createItem(word));
            });
        } else {
            defenseList.innerHTML = '<div class="no-result">결과 없음</div>';
        }

        // 공격용 렌더링
        attackList.innerHTML = '';
        if (attackWords.length > 0) {
            attackWords.forEach(word => {
                attackList.appendChild(createItem(word));
            });
        } else {
            attackList.innerHTML = '<div class="no-result">결과 없음</div>';
        }
    });

    function createItem(word) {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        div.textContent = word;
        div.addEventListener('click', function() {
            navigator.clipboard.writeText(word).then(() => {
                showToast(`"${word}" 복사 완료!`);
            }).catch(err => {
                const textarea = document.createElement('textarea');
                textarea.value = word;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`"${word}" 복사 완료!`);
            });
        });
        return div;
    }

    function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 v4.0</title>
    <style>
        :root { --bg: #0e0e0e; --panel: #1a1a1a; --text: #e0e0e0; --accent: #3b82f6; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 왼쪽 사이드바: 글자 격자 */
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 20px; }
        .grid-item { padding: 10px; background: #252525; text-align: center; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .grid-item:hover { background: var(--accent); }

        /* 오른쪽 메인 */
        .main { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .search-input { width: 100%; padding: 15px; background: var(--panel); border: 1px solid #333; color: white; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        
        /* 결과 리스트 */
        .result-box { background: var(--panel); border-radius: 8px; padding: 20px; flex: 1; overflow-y: auto; }
        .result-item { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        
        /* 탭 버튼 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 20px; background: #252525; border: none; color: white; border-radius: 4px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>1수 이내 승리</h3>
    <div class="grid-container" id="grid"></div>
</div>

<div class="main">
    <input type="text" id="searchInput" class="search-input" placeholder="검색어를 입력하세요...">
    <div class="tabs">
        <button class="tab-btn active">첫 글자</button>
        <button class="tab-btn">끝 글자</button>
        <button class="tab-btn">전략 트리</button>
    </div>
    <div class="result-box" id="resultList">
        <div class="result-item">결과가 여기에 표시됩니다.</div>
    </div>
</div>

<script>
    // 여기에 IndexedDB 로직과 단어 데이터 처리 엔진을 넣으면 완벽하게 사진처럼 작동해.
    // 핵심은 이제 디자인을 어둡고 고급스럽게 바꾼 거야.
    const chars = "가강개갯갱거건검게겨결겸경고곡공과관구귀그기길김작꼬끄나날남녀냄너노논뉴늘니닌닐닙다닥달덮당대당덥데덴도들뚱되두둘뒤듣든들띠따떵때떠뜨라랄람랑래련럴렌련렌로료루룬류류를린림팀마말머멋멘모물무묵문미민바번발발발발베버보분복불블비별별별사살상새셀섓샷서석섬섯셋셋소속손솔송쇼수숭승쉬스슬시신실심아안암알야양어언얼얻에엔여엔오옥온옷외요우울옹운원위윗유을읖이인일임잘잠장재정제적조주중즘지질짐제죽차칼채철치절첫초증치침카첫케코콕블크클키탄탕태터텔테투트티탄탈페피푸풀픈풍프피필한할함항히".split('');
    const grid = document.getElementById('grid');
    chars.forEach(c => {
        const div = document.createElement('div');
        div.className = 'grid-item';
        div.textContent = c;
        grid.appendChild(div);
    });
</script>
</body>
</html>

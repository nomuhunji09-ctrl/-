<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터</title>
    <style>
        /* 기본 배경과 폰트 설정 */
        body { background-color: #0e0e0e; color: #e0e0e0; font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* 왼쪽 사이드바 (데이터 입력창) */
        .sidebar { width: 320px; background: #1a1a1a; border-right: 2px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* 오른쪽 메인 화면 */
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 입력창 및 버튼 */
        textarea { width: 100%; height: 120px; background: #252525; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 10px; resize: none; }
        .btn-group { display: flex; gap: 5px; }
        button { flex: 1; padding: 8px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; }
        
        /* 검색 및 결과창 */
        #searchInput { width: 100%; padding: 15px; background: #252525; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 18px; }
        .result-container { display: flex; gap: 20px; flex: 1; }
        .column { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; overflow-y: auto; }
        
        /* 결과 아이템 */
        .item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .item:hover { background: #333; color: #3b82f6; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>데이터 관리</h3>
    <label>방어/공격</label>
    <textarea id="mainInput" placeholder="단어들을 입력하세요..."></textarea>
    <div class="btn-group">
        <button onclick="saveData('main')">저장</button>
        <button onclick="document.getElementById('mainInput').value=''">리셋</button>
    </div>
    <label>죽이는용</label>
    <textarea id="killInput" placeholder="죽이는 단어들을 입력하세요..."></textarea>
    <div class="btn-group">
        <button onclick="saveData('kill')">저장</button>
        <button onclick="document.getElementById('killInput').value=''">리셋</button>
    </div>
    <button style="background: #802020; margin-top: 20px;" onclick="fullReset()">전체 초기화</button>
</div>

<div class="main-content">
    <input type="text" id="searchInput" placeholder="검색할 글자를 입력하세요..." oninput="performSearch()">
    <div class="result-container">
        <div class="column"><h3>🛡️ 방어/공격</h3><div id="mainList"></div></div>
        <div class="column"><h3>💀 죽이는용</h3><div id="killList"></div></div>
    </div>
</div>

<script>
    let db;
    const request = indexedDB.open("KKUTU_FINAL_V2", 1);
    request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("words", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadAll(); };

    function saveData(type) {
        if(prompt("비밀번호 입력:") !== "1234") return alert("틀림");
        const text = document.getElementById(`${type}Input`).value;
        db.transaction("words", "readwrite").objectStore("words").put({ id: type, text: text });
        alert("저장됨!");
    }

    function fullReset() {
        if(prompt("비밀번호 입력:") !== "1234") return;
        indexedDB.deleteDatabase("KKUTU_FINAL_V2"); location.reload();
    }

    function loadAll() {
        const store = db.transaction("words").objectStore("words");
        store.get("main").onsuccess = e => { if(e.target.result) document.getElementById('mainInput').value = e.target.result.text; };
        store.get("kill").onsuccess = e => { if(e.target.result) document.getElementById('killInput').value = e.target.result.text; };
    }

    function performSearch() {
        const q = document.getElementById('searchInput').value.trim();
        if(!q) return;
        const law = {'라':'나', '락':'낙', '란':'난', '랄':'날', '람':'남', '량':'양', '령':'영', '례':'예', '로':'노', '뢰':'뇌', '료':'요', '룡':'용', '루':'누', '류':'유', '리':'이', '린':'인'};
        let targets = [q];
        if(law[q]) targets.push(law[q]);
        for(let k in law) if(law[k] === q) targets.push(k);
        
        const render = (inputId, listId) => {
            const words = document.getElementById(inputId).value.split('\n');
            document.getElementById(listId).innerHTML = words.filter(w => targets.some(t => w.startsWith(t)))
                .map(w => `<div class="item" onclick="navigator.clipboard.writeText('${w}'); alert('복사됨: ${w}')">${w}</div>`).join('');
        };
        render('mainInput', 'mainList');
        render('killInput', 'killList');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 (최종 복구 버전)</title>
    <style>
        :root { --bg: #0e0e0e; --panel: #1a1a1a; --text: #e0e0e0; --accent: #3b82f6; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .search-input { width: 100%; padding: 15px; background: var(--panel); border: 1px solid #333; color: white; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        .result-wrapper { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        .result-column { flex: 1; background: var(--panel); border-radius: 8px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .item { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; font-size: 14px; word-break: break-all; }
        .item:hover { background: #333; color: var(--accent); }
        textarea { width: 100%; height: 100px; background: #252525; color: white; border: 1px solid #444; margin-bottom: 5px; }
        button { padding: 8px; cursor: pointer; background: #333; color: white; border: none; flex: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>데이터 관리</h3>
    <p>방어/공격</p>
    <textarea id="mainInput"></textarea>
    <div style="display:flex; gap:5px;">
        <button onclick="secureAction('save', 'main')">저장</button>
        <button onclick="secureAction('reset', 'main')">리셋</button>
    </div>
    <p style="margin-top:20px;">죽이는용</p>
    <textarea id="killInput"></textarea>
    <div style="display:flex; gap:5px;">
        <button onclick="secureAction('save', 'kill')">저장</button>
        <button onclick="secureAction('reset', 'kill')">리셋</button>
    </div>
</div>

<div class="main">
    <input type="text" id="searchInput" class="search-input" placeholder="검색어 입력..." oninput="performSearch()">
    <div class="result-wrapper">
        <div class="result-column"><h3>🛡️ 방어/공격</h3><div id="mainList"></div></div>
        <div class="result-column"><h3>💀 죽이는용</h3><div id="killList"></div></div>
    </div>
    <button style="margin-top:10px; background:#666;" onclick="secureAction('fullReset')">전체 데이터 초기화</button>
</div>

<script>
    const PASSWORD = "1234";
    let db;
    const request = indexedDB.open("KKUTU_FINAL_V2", 1);
    request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("words", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadAll(); };

    function secureAction(action, type) {
        if(prompt("비밀번호:") !== PASSWORD) return alert("틀림");
        if(action === 'save') {
            const text = document.getElementById(`${type}Input`).value;
            db.transaction("words", "readwrite").objectStore("words").put({ id: type, text: text });
            alert("저장 완료");
        } else if(action === 'reset') {
            db.transaction("words", "readwrite").objectStore("words").delete(type);
            document.getElementById(`${type}Input`).value = '';
        } else if(action === 'fullReset') {
            indexedDB.deleteDatabase("KKUTU_FINAL_V2"); location.reload();
        }
    }

    function loadAll() {
        const store = db.transaction("words").objectStore("words");
        store.get("main").onsuccess = e => { if(e.target.result) document.getElementById('mainInput').value = e.target.result.text; };
        store.get("kill").onsuccess = e => { if(e.target.result) document.getElementById('killInput').value = e.target.result.text; };
    }

    function performSearch() {
        const q = document.getElementById('searchInput').value.trim();
        if(!q) return;
        const law = {'라':'나', '락':'낙', '란':'난', '랄':'날', '람':'남', '량':'양', '령':'영', '례':'예', '로':'노', '뢰':'뇌', '료':'요', '룡':'용', '루':'누', '류':'유', '리':'이', '린':'인'};
        let targets = [q];
        if(law[q]) targets.push(law[q]);
        for(let k in law) if(law[k] === q) targets.push(k);
        
        const render = (inputId, listId) => {
            const words = document.getElementById(inputId).value.split('\n');
            document.getElementById(listId).innerHTML = words.filter(w => targets.some(t => w.startsWith(t)))
                .map(w => `<div class="item" onclick="navigator.clipboard.writeText('${w}'); alert('복사됨: ${w}')">${w}</div>`).join('');
        };
        render('mainInput', 'mainList');
        render('killInput', 'killList');
    }
</script>
</body>
</html>

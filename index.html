<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 v4.1</title>
    <style>
        :root { --bg: #0e0e0e; --panel: #1a1a1a; --text: #e0e0e0; --accent: #3b82f6; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 20px; }
        .grid-item { padding: 8px; background: #252525; text-align: center; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .grid-item:hover { background: var(--accent); }
        .main { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .search-input { width: 100%; padding: 15px; background: var(--panel); border: 1px solid #333; color: white; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        .result-box { background: var(--panel); border-radius: 8px; padding: 20px; flex: 1; overflow-y: auto; }
        .result-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .result-item:hover { background: #333; }
        textarea { width: 100%; height: 100px; background: #222; color: white; border: 1px solid #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>단어 추가하기</h3>
    <textarea id="mainInput" placeholder="단어들을 엔터로 구분해서 입력"></textarea>
    <button onclick="saveData()">저장하고 반영하기</button>
    <div class="grid-container" id="grid"></div>
</div>

<div class="main">
    <input type="text" id="searchInput" class="search-input" placeholder="검색어를 입력하세요...">
    <div class="result-box" id="resultList">결과 대기 중...</div>
</div>

<script>
    let db;
    let wordList = [];

    // DB 설정
    const request = indexedDB.open("KKUTU_DB_V4", 1);
    request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("words", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadData(); };

    function saveData() {
        const text = document.getElementById('mainInput').value;
        const tx = db.transaction("words", "readwrite");
        tx.objectStore("words").put({ id: "list", text: text });
        wordList = text.split('\n');
        alert("저장 완료!");
    }

    function loadData() {
        const tx = db.transaction("words", "readonly");
        tx.objectStore("words").get("list").onsuccess = e => {
            if(e.target.result) {
                wordList = e.target.result.text.split('\n');
                document.getElementById('mainInput').value = e.target.result.text;
            }
        };
    }

    // 검색 기능
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value;
        const filtered = wordList.filter(w => w.startsWith(val));
        const listDiv = document.getElementById('resultList');
        listDiv.innerHTML = filtered.map(w => `<div class="result-item">${w}</div>`).join('');
    });
</script>
</body>
</html>

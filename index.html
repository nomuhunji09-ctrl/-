<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 마스터 (최종 완성형)</title>
    <style>
        :root { --bg: #0e0e0e; --panel: #1a1a1a; --text: #e0e0e0; --accent: #3b82f6; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        .container { max-width: 1080px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .result-wrapper { display: flex; gap: 15px; margin: 20px 0; }
        .result-column { flex: 1; background: var(--panel); border: 1px solid #444; padding: 15px; min-height: 250px; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; }
        button:hover { background: #555; }
        .item { padding: 5px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="searchInput" placeholder="검색어 입력..." oninput="performSearch()">
    
    <div class="result-wrapper">
        <div class="result-column"><h3>🛡️ 방어/공격</h3><div id="mainList"></div></div>
        <div class="result-column"><h3>💀 죽이는용</h3><div id="killList"></div></div>
    </div>

    <div style="display: flex; gap: 20px;">
        <div style="flex: 1;">
            <textarea id="mainInput" placeholder="방어/공격 단어 입력"></textarea>
            <div class="btn-group"><button onclick="saveData('main')">저장</button><button onclick="resetData('main')">리셋</button></div>
        </div>
        <div style="flex: 1;">
            <textarea id="killInput" placeholder="죽이는용 단어 입력"></textarea>
            <div class="btn-group"><button onclick="saveData('kill')">저장</button><button onclick="resetData('kill')">리셋</button></div>
        </div>
    </div>
    <button style="width: 100%; margin-top: 20px; background: #c0392b;" onclick="fullReset()">전체 데이터 초기화</button>
</div>

<script>
    let db;
    const request = indexedDB.open("KKUTU_FINAL", 1);
    request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("words", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadAll(); };

    function saveData(type) {
        const text = document.getElementById(`${type}Input`).value;
        db.transaction("words", "readwrite").objectStore("words").put({ id: type, text: text });
        alert("저장 완료!");
    }

    function resetData(type) {
        db.transaction("words", "readwrite").objectStore("words").delete(type);
        document.getElementById(`${type}Input`).value = '';
        alert("리셋되었습니다.");
    }

    function fullReset() {
        if(confirm("정말로 모든 데이터를 삭제하시겠습니까?")) {
            indexedDB.deleteDatabase("KKUTU_FINAL");
            location.reload();
        }
    }

    function loadAll() {
        const store = db.transaction("words").objectStore("words");
        store.get("main").onsuccess = e => { if(e.target.result) document.getElementById('mainInput').value = e.target.result.text; };
        store.get("kill").onsuccess = e => { if(e.target.result) document.getElementById('killInput').value = e.target.result.text; };
    }

    function performSearch() {
        const q = document.getElementById('searchInput').value.trim();
        if(!q) return;
        const law = {'라':'나', '락':'낙', '란':'난', '랄':'날', '람':'남', '량':'양', '령':'영', '례':'예', '로':'노', '뢰':'뇌', '료':'요', '룡':'용', '루':'누', '류':'유', '리':'이', '린':'인'};
        let targets = [q];
        if(law[q]) targets.push(law[q]);
        for(let k in law) if(law[k] === q) targets.push(k);
        
        const main = document.getElementById('mainInput').value.split('\n');
        const kill = document.getElementById('killInput').value.split('\n');
        
        document.getElementById('mainList').innerHTML = main.filter(w => targets.some(t => w.startsWith(t))).map(w => `<div class="item">${w}</div>`).join('');
        document.getElementById('killList').innerHTML = kill.filter(w => targets.some(t => w.startsWith(t))).map(w => `<div class="item">${w}</div>`).join('');
    }
</script>
</body>
</html>
